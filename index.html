    const ACHIEVEMENTS = [
      { id: 'first_race', name: 'First Race', desc: 'Complete your first race', check: a => a.stats.racesDone >= 1, reward: 50 },
      { id: 'ten_races', name: 'Getting Started', desc: 'Complete 10 races', check: a => a.stats.racesDone >= 10, reward: 200 },
      { id: 'fifty_races', name: 'Veteran Racer', desc: 'Complete 50 races', check: a => a.stats.racesDone >= 50, reward: 500 },
      { id: 'first_win', name: 'First Victory', desc: 'Win your first race', check: a => a.stats.wins >= 1, reward: 100 },
      { id: 'ten_wins', name: 'Champion', desc: 'Win 10 races', check: a => a.stats.wins >= 10, reward: 500 },
      { id: 'twenty_wins', name: 'Legend', desc: 'Win 20 races', check: a => a.stats.wins >= 20, reward: 1000 },
      { id: 'hundred_xp', name: 'Learning', desc: 'Earn 100 XP', check: a => a.xp >= 100, reward: 200 },
      { id: 'thousand_xp', name: 'Scholar', desc: 'Earn 1000 XP', check: a => a.xp >= 1000, reward: 1000 },

    // ─── Storage ──────────────────────────────────────────────
    const ACCOUNTS_KEY = 'nitro_accounts';
    const CURRENT_KEY = 'nitro_current';

    function getAccounts() {
      const raw = localStorage.getItem(ACCOUNTS_KEY);
      return raw ? JSON.parse(raw) : [];
    }

    function saveAccounts(accounts) {
      localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
    }

    function getCurrentUsername() {
      return localStorage.getItem(CURRENT_KEY);
    }

    function setCurrentUsername(username) {
      localStorage.setItem(CURRENT_KEY, username);
    }

    function clearCurrentUsername() {
      localStorage.removeItem(CURRENT_KEY);
    }

    function findAccount(username) {
      return getAccounts().find(a => a.username === username);
    }

    function updateAccount(username, updater) {
      const accounts = getAccounts();
      const idx = accounts.findIndex(a => a.username === username);
      if (idx === -1) return null;
      const updated = updater(accounts[idx]);
      accounts[idx] = updated;
      saveAccounts(accounts);
      return updated;
    }

    function getCurrentAccount() {
      const username = getCurrentUsername();
      if (!username) return null;
      return findAccount(username) ?? null;
    }

    function simpleHash(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) {
        const c = s.charCodeAt(i);
        h = ((h << 5) - h) + c;
        h = h & h;
      }
      return 'h' + Math.abs(h).toString(36);
    }

    function registerAccount(username, password) {
      if (username.length < 2) return 'Username must be at least 2 characters';
      if (password.length < 3) return 'Password must be at least 3 characters';
      if (findAccount(username)) return 'Username already taken';
      const account = createAccount(username, simpleHash(password));
      const accounts = getAccounts();
      accounts.push(account);
      saveAccounts(accounts);
      return null;
    }

    function loginAccount(username, password) {
      const account = findAccount(username);
      if (!account) return 'Account not found';
      if (account.password !== simpleHash(password)) return 'Wrong password';
      setCurrentUsername(username);
      return null;
    }

    // ─── Lemniscate helpers ──────────────────────────────────
    function lemniscatePos(t, scale) {
      const d = 1 + Math.sin(t) * Math.sin(t);
      return {
        x: scale * Math.cos(t) / d,
        y: scale * Math.sin(t) * Math.cos(t) / d,
      };
    }

    function lemniscateAngle(t) {
      const eps = 0.001;
      const p1 = lemniscatePos(t - eps, 1);
      const p2 = lemniscatePos(t + eps, 1);
      return Math.atan2(p2.y - p1.y, p2.x - p1.x);
    }

    function lemniscateNormal(t) {
      return lemniscateAngle(t) + Math.PI / 2;
    }

    // ─── AuthContext ──────────────────────────────────────────
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [account, setAccount] = useState(() => {
        const username = getCurrentUsername();
        if (!username) return null;
        return findAccount(username) ?? null;
      });

      const refreshAccount = useCallback(() => {
        const username = getCurrentUsername();
        if (!username) { setAccount(null); return; }
        setAccount(findAccount(username) ?? null);
      }, []);

      const login = useCallback((username, password) => {
        const err = loginAccount(username, password);
        if (err) return err;
        refreshAccount();
        return null;
      }, [refreshAccount]);

      const register = useCallback((username, password) => {
        const err = registerAccount(username, password);
        if (err) return err;
        setCurrentUsername(username);
        refreshAccount();
        return null;
      }, [refreshAccount]);

      const logout = useCallback(() => {
        clearCurrentUsername();
        setAccount(null);
      }, []);

      const addXp = useCallback((amount) => {
        const username = getCurrentUsername();
        if (!username) return;
        updateAccount(username, (a) => {
          a.xp += amount;
          for (const ach of ACHIEVEMENTS) {
            if (!a.achievements.includes(ach.id) && ach.check(a)) {
              a.achievements.push(ach.id);
              a.coins += ach.reward;
            }
          }
          return a;
        });
        refreshAccount();
      }, [refreshAccount]);

      const addCoins = useCallback((amount) => {
        const username = getCurrentUsername();
        if (!username) return;
        updateAccount(username, (a) => {
          a.coins += amount;
          return a;
        });
        refreshAccount();
      }, [refreshAccount]);

      return (
        React.createElement(AuthContext.Provider, { value: { account, login, register, logout, refreshAccount, addXp, addCoins } },
          children
        )
      );
    }

    function useAuth() {
      const ctx = useContext(AuthContext);
      if (!ctx) throw new Error('useAuth must be inside AuthProvider');
      return ctx;
    }

    // ─── Pages ────────────────────────────────────────────────

        setError('');

    // ─── RacePage ─────────────────────────────────────────────
    const RACE_BASE_SPEED = 0.12;
    const FUEL_SPEED_BONUS = 0.4;

    const FUEL_PER_CORRECT = 30;
    const DAMAGE_PER_WRONG = 15;
    const DAMAGE_PER_TYPING_MISTAKE = 5;

    const COMBO_BONUS_PER_STACK = 5;
    const TYPING_FUEL_PER_WORD = 8;

    function generateMathQuestion(difficulty) {
      const lap = Math.min(difficulty, 8);
      let ops;
      if (lap <= 1) ops = ['+', '-'];
      else if (lap <= 2) ops = ['+', '-', '×'];
      else ops = ['+', '-', '×', '÷'];

      const op = ops[Math.floor(Math.random() * ops.length)];
      let a, b, answer, text;

      const maxNum = 10 + lap * 10;

      switch (op) {
        case '+':
          a = Math.floor(Math.random() * maxNum) + 5;
          b = Math.floor(Math.random() * maxNum) + 5;
          answer = a + b;
          text = `${a} + ${b} = ?`;
          break;
        case '-':
          a = Math.floor(Math.random() * maxNum) + 10;
          b = Math.floor(Math.random() * Math.min(a, maxNum)) + 1;
          answer = a - b;
          text = `${a} - ${b} = ?`;
          break;
        case '×':
          a = lap <= 3 ? Math.floor(Math.random() * 9) + 2 : Math.floor(Math.random() * 12) + 2;
          b = lap <= 3 ? Math.floor(Math.random() * 9) + 2 : Math.floor(Math.random() * (5 + lap)) + 2;
          answer = a * b;
          text = `${a} × ${b} = ?`;
          break;
        case '÷':
          b = Math.floor(Math.random() * 9) + 2;
          const quotient = Math.floor(Math.random() * 9) + 1;
          a = b * quotient;
          answer = quotient;
          text = `${a} ÷ ${b} = ?`;
          break;
      }
      return { text, answer };
    }

    function generateTypingPassage(used) {
      const pool = TYPING_PASSAGES.filter(p => p !== used);
      const text = pool[Math.floor(Math.random() * pool.length)] || TYPING_PASSAGES[Math.floor(Math.random() * TYPING_PASSAGES.length)];
      return { text, words: text.split(' ') };

    function lerp(a, b, t) { return a + (b - a) * t; }

    function RacePage({ mode, onFinish }) {
      const { account, refreshAccount, addXp, addCoins } = useAuth();
      const canvasRef = useRef(null);
      const animRef = useRef(0);
      const usedPassageRef = useRef('');
      const gsRef = useRef({
        cars: [], bots: [], phase: 'countdown', countdown: 4, timer: 0,
        question: null, typingState: null, questionTimer: 0, questionActive: false,
        finished: false, winner: null, playerFinished: false,
        boostReady: false, combo: 0, difficultyLevel: 1,
        weatherTime: 0, rainIntensity: 0,
        particles: [],
      });

      const [uiState, setUiState] = useState({
        phase: 'countdown', countdown: 4,
        question: null, typingState: null,
        playerFuel: 0, playerDamage: 0, playerLaps: 0, playerSpeed: 0,
        standings: [], winner: null, boostReady: false,
        combo: 0, difficultyLevel: 1,
      });

      const inputRef = useRef(null);
      const [answer, setAnswer] = useState('');
      const [typingInput, setTypingInput] = useState('');
      const usedBoostThisRace = useRef(false);

      function consumeBoost() {
        if (usedBoostThisRace.current) return false;
        const inv = account?.inventory;
        if (!inv) return false;
        for (const b of BOOSTS) {
          const key = `boost${b.tier.charAt(0).toUpperCase() + b.tier.slice(1)}`;
          if (inv[key] > 0) {
            const username = getCurrentUsername();
            if (username) { updateAccount(username, (a) => { a.inventory[key] -= 1; return a; }); refreshAccount(); }
            usedBoostThisRace.current = true;
            gsRef.current.boostReady = false;
            setUiState(prev => ({ ...prev, boostReady: false }));
            return true;
          }
        }
        return false;
      }

      function initRace() {
        const playerColor = account?.car.color ?? '#e23636';
        const playerDamage = account?.car.damage ?? 0;
        const cars = [
          { name: PLAYER_NAME, progress: 0, speed: 0, fuel: 0, damage: playerDamage, laps: 0, color: playerColor, isPlayer: true, active: true, finishTime: null },
          ...BOT_CONFIGS.map((b, i) => ({
            name: b.name, progress: 0, speed: 0, fuel: 0, damage: 0, laps: 0, color: b.color, isPlayer: false, active: true, finishTime: null, nextAction: 0.5 + i * 0.3,
          })),
        ];
        usedBoostThisRace.current = false;
        usedPassageRef.current = '';
        gsRef.current = {
          cars, bots: BOT_CONFIGS, phase: 'countdown', countdown: 4, timer: 0,
          question: null, typingState: null, questionTimer: 0, questionActive: false,
          finished: false, winner: null, playerFinished: false, boostReady: false,
          combo: 0, difficultyLevel: 1, weatherTime: 0, rainIntensity: 0, particles: [],
        };
      }

      function showNextQuestion() {
        const gs = gsRef.current;
        const q = generateMathQuestion(gs.difficultyLevel);
        gs.question = q;
        gs.questionActive = true;
        gs.questionTimer = 0;
        setUiState(prev => ({ ...prev, question: q }));
        setAnswer('');
        inputRef.current?.focus();
      }

      function startTyping() {
        const gs = gsRef.current;
        const { text, words } = generateTypingPassage(usedPassageRef.current);
        usedPassageRef.current = text;
        const ts = { words, currentWordIdx: 0, typed: '', passage: text };
        gs.typingState = ts;
        gs.questionActive = true;
        gs.questionTimer = 0;
        setUiState(prev => ({ ...prev, typingState: ts }));
        setTypingInput('');
        inputRef.current?.focus();
      }

      function handleMathAnswer(value) {
        const gs = gsRef.current;
        if (!gs.question || !gs.questionActive) return;
        const num = parseInt(value, 10);
        const playerCar = gs.cars[0];
        if (!playerCar) return;
        if (num === gs.question.answer) {
          gs.combo += 1;
          let bonus = FUEL_PER_CORRECT + Math.min(gs.combo, 20) * COMBO_BONUS_PER_STACK;
          if (gs.boostReady && !usedBoostThisRace.current && consumeBoost()) {
            bonus += BOOSTS.reduce((max, b) => Math.max(max, b.mathFuelBonus), 0);
          }
          playerCar.fuel = Math.min(100, playerCar.fuel + bonus);
        } else {
          gs.combo = 0;
          playerCar.damage = Math.min(MAX_DAMAGE, playerCar.damage + DAMAGE_PER_WRONG);
        }
        gs.question = null;
        gs.questionActive = false;
        setUiState(prev => ({ ...prev, question: null, combo: gs.combo }));
        setAnswer('');
      }

      function handleTypingInput(value) {
        const gs = gsRef.current;
        const ts = gs.typingState;
        if (!ts || !gs.questionActive) return;
        if (value.endsWith(' ') || value.endsWith('\n')) {
          const word = value.trim();
          const targetWord = ts.words[ts.currentWordIdx];
          if (!targetWord) return;
          let skipBonus = 0;
          if (gs.boostReady && !usedBoostThisRace.current && consumeBoost()) {
            skipBonus = BOOSTS.reduce((max, b) => Math.max(max, b.typingSkipWords), 0);
          }
          if (word === targetWord) {
            gs.combo += 1;
            const comboBonus = Math.min(gs.combo, 20);
            const skipTo = Math.min(ts.words.length, ts.currentWordIdx + 1 + skipBonus);
            ts.currentWordIdx = skipTo;
            const playerCar = gs.cars[0];
            if (playerCar) {
              playerCar.fuel = Math.min(100, playerCar.fuel + TYPING_FUEL_PER_WORD + comboBonus);
            }
          } else {
            gs.combo = 0;
            ts.currentWordIdx += 1;
          }
          if (ts.currentWordIdx >= ts.words.length) {
            gs.typingState = null;
            gs.questionActive = false;
            setUiState(prev => ({ ...prev, typingState: null, combo: gs.combo }));
            setTypingInput('');
            startTyping();
          } else {
            setUiState(prev => ({ ...prev, typingState: { ...ts }, combo: gs.combo }));
            setTypingInput('');
          }
        } else {
          setTypingInput(value);
        }
      }

      function handleTypingKey(e) {
        if (e.key === ' ' || e.key === 'Enter') e.preventDefault();
      }

      useEffect(() => {
        function onKeyDown(e) {
          const gs = gsRef.current;
          if (gs.phase !== 'racing' || gs.finished) return;
          const playerCar = gs.cars[0];
          if (!playerCar || !playerCar.active) return;
          switch (e.key) {
            case 'e': case 'E':
              if (mode === 'math' && !gs.questionActive && !usedBoostThisRace.current) {
                const inv = account?.inventory;
                if (inv && BOOSTS.some(b => inv[`boost${b.tier.charAt(0).toUpperCase() + b.tier.slice(1)}`] > 0)) {
                  gs.boostReady = true;
                  setUiState(prev => ({ ...prev, boostReady: true }));
                }
              }
              break;
            case 'Tab':
              if (mode === 'typing' && !gs.questionActive && !usedBoostThisRace.current) {
                const inv = account?.inventory;
                if (inv && BOOSTS.some(b => inv[`boost${b.tier.charAt(0).toUpperCase() + b.tier.slice(1)}`] > 0)) {
                  gs.boostReady = true;
                  setUiState(prev => ({ ...prev, boostReady: true }));
                }
              }
              e.preventDefault(); break;
          }
        }
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [mode, account]);

      const gameLoop = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.imageSmoothingEnabled = true;
        const W = rect.width;
        const H = rect.height;
        const gs = gsRef.current;
        const dt = 1 / 60;
        const scale = Math.min(W, H) * 0.3;
        const trackW = Math.min(W, H) * 0.055;

        // Weather cycle
        gs.weatherTime += dt * 0.02;
        const dayNight = (Math.sin(gs.weatherTime) + 1) / 2;
        gs.rainIntensity = Math.max(0, Math.sin(gs.weatherTime * 0.7 + 1) * 0.5);

        // Countdown
        if (gs.phase === 'countdown') {
          gs.countdown -= dt;
          if (gs.countdown <= 0) { gs.phase = 'racing'; gs.timer = 0; }
          setUiState(prev => ({ ...prev, countdown: Math.ceil(gs.countdown), phase: 'countdown', boostReady: gs.boostReady, combo: gs.combo }));
        }

        // Racing logic
        if (gs.phase === 'racing' && !gs.finished) {
          gs.timer += dt;
          const playerCar = gs.cars[0];

          // Difficulty increases with laps
          if (playerCar) gs.difficultyLevel = Math.max(1, playerCar.laps + 1);

          // Questions
          if (playerCar && playerCar.active) {
            if (mode === 'math' && !gs.questionActive) {
              gs.questionTimer += dt;
              if (gs.questionTimer > 1.2) showNextQuestion();
            }
            if (mode === 'typing' && !gs.questionActive) {
              gs.questionTimer += dt;
              if (gs.questionTimer > 0.3) startTyping();
            }
          }

          // Bot AI with catch-up scaling
          const avgBotLaps = gs.cars.slice(1).reduce((s, c) => s + c.laps, 0) / Math.max(1, gs.cars.length - 1);
          const playerLaps = playerCar ? playerCar.laps : 0;
          for (let i = 1; i < gs.cars.length; i++) {
            const car = gs.cars[i];
            const bot = gs.bots[i - 1];
            if (!car || !bot || !car.active) continue;
            if (gs.timer < car.nextAction) continue;
            car.nextAction = gs.timer + 1.2 + Math.random() * 0.8;
            let skillScale = 1;
            if (playerLaps > avgBotLaps + 0.5) skillScale = 1 + Math.min(0.3, (playerLaps - avgBotLaps) * 0.1);
            if (playerLaps < avgBotLaps - 0.5) skillScale = 1 - Math.min(0.3, (avgBotLaps - playerLaps) * 0.1);
            const effectiveSkill = Math.min(0.95, bot.skill * skillScale);
            if (mode === 'math') {
              if (Math.random() < effectiveSkill) {
                car.fuel = Math.min(100, car.fuel + FUEL_PER_CORRECT * (0.4 + Math.random() * 0.6));
              } else {
                car.damage = Math.min(MAX_DAMAGE, car.damage + DAMAGE_PER_WRONG * (0.3 + Math.random() * 0.4));
              }
            } else {
              if (Math.random() < effectiveSkill) {
                car.fuel = Math.min(100, car.fuel + 2 + Math.random() * 3);
              } else {
                car.damage = Math.min(MAX_DAMAGE, car.damage + DAMAGE_PER_TYPING_MISTAKE * (0.5 + Math.random() * 0.5));
              }
            }
          }

          // Move cars
          for (const car of gs.cars) {
            if (!car.active) continue;
            let speed = RACE_BASE_SPEED + (car.fuel / 100) * FUEL_SPEED_BONUS;
            speed *= (1 - (car.damage / MAX_DAMAGE) * 0.7);
            car.speed = speed;
            car.progress += speed * dt * 0.7;
            car.fuel = Math.max(0, car.fuel - FUEL_DRAIN * dt * (1 + car.damage / MAX_DAMAGE));
            if (car.progress >= 1) {
              car.progress -= 1;
              car.laps += 1;
              if (car.laps >= LAPS_TO_WIN) {
                if (car.isPlayer) {
                  car.active = false;
                  gs.playerFinished = true;
                  if (!gs.winner) gs.winner = car.name;
                } else {
                  if (!car.finishTime) {
                    car.finishTime = gs.timer;
                    if (!gs.winner) gs.winner = car.name;
                  }
                  car.fuel = Math.max(0, car.fuel - 10);
                }
              }
            }
            if (car.damage >= MAX_DAMAGE) { car.active = false; car.finishTime = null; if (car.isPlayer) gs.playerFinished = true; }
          }
          if (gs.playerFinished) gs.finished = true;

          // Speed particles
          for (const car of gs.cars) {
            if (!car.active || car.speed < 0.15) continue;
            const t = car.progress * Math.PI * 2;
            const base = lemniscatePos(t, scale);
            const angle = lemniscateAngle(t);
            const px = (W / 2) + base.x;
            const py = (H / 2) + base.y;
            const backAngle = angle + Math.PI;
            if (Math.random() < car.speed * 0.4) {
              gs.particles.push({
                x: px + Math.cos(backAngle) * 8,
                y: py + Math.sin(backAngle) * 8,
                vx: Math.cos(backAngle + (Math.random() - 0.5) * 0.5) * (0.3 + Math.random() * 0.5),
                vy: Math.sin(backAngle + (Math.random() - 0.5) * 0.5) * (0.3 + Math.random() * 0.5),
                life: 0.3 + Math.random() * 0.4,
                maxLife: 0.3 + Math.random() * 0.4,
                color: car.color,
                size: 1.5 + Math.random() * 2,
              });
            }
          }
          for (let i = gs.particles.length - 1; i >= 0; i--) {
            const p = gs.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= dt;
            if (p.life <= 0) gs.particles.splice(i, 1);
          }
        }

        // ── Render ──
        const cx = W / 2, cy = H / 2;

        ctx.clearRect(0, 0, W, H);

        // Sky / background
        const nightAmt = Math.max(0, 1 - dayNight * 2);
        const bgR = lerp(13, 5, nightAmt);
        const bgG = lerp(17, 8, nightAmt);
        const bgB = lerp(23, 18, nightAmt);
        ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
        ctx.fillRect(0, 0, W, H);

        // Stars at night
        if (nightAmt > 0.3) {
          ctx.fillStyle = `rgba(255,255,255,${nightAmt * 0.5})`;
          const starSeed = 12345;
          for (let i = 0; i < 40; i++) {
            const sx = ((i * 137 + starSeed) % W);
            const sy = ((i * 97 + starSeed * 3) % (H * 0.6));
            const ss = ((i * 11) % 3) + 1;
            ctx.fillRect(sx, sy, ss, ss);
          }
        }

        // Rain
        if (gs.rainIntensity > 0.05) {
          ctx.strokeStyle = `rgba(150,180,220,${gs.rainIntensity * 0.3})`;
          ctx.lineWidth = 1;
          for (let i = 0; i < 80 * gs.rainIntensity; i++) {
            const rx = ((i * 293 + gs.timer * 200 * (1 + (i % 3) * 0.3)) % W);
            const ry = ((i * 157 + gs.timer * 500 * (1 + (i % 2) * 0.2)) % H);
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx - 2, ry + 12);
            ctx.stroke();
          }
        }

        // Track
        ctx.beginPath();
        for (let i = 0; i <= 200; i++) {
          const t = (i / 200) * Math.PI * 2;
          const p = lemniscatePos(t, scale);
          i === 0 ? ctx.moveTo(cx + p.x, cy + p.y) : ctx.lineTo(cx + p.x, cy + p.y);
        }
        ctx.closePath();
        const trackR = lerp(42, 30, nightAmt);
        const trackG = lerp(42, 25, nightAmt);
        const trackB = lerp(70, 40, nightAmt);
        ctx.strokeStyle = `rgb(${trackR},${trackG},${trackB})`;
        ctx.lineWidth = trackW;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        // Track glow at night
        if (nightAmt > 0.2) {
          ctx.strokeStyle = `rgba(60,60,120,${nightAmt * 0.15})`;
          ctx.lineWidth = trackW + 8;
          ctx.stroke();
        }

        // Center dashes
        ctx.beginPath();
        for (let i = 0; i <= 200; i++) {
          const t = (i / 200) * Math.PI * 2;
          const p = lemniscatePos(t, scale);
          i === 0 ? ctx.moveTo(cx + p.x, cy + p.y) : ctx.lineTo(cx + p.x, cy + p.y);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(255,255,255,${lerp(0.08, 0.04, nightAmt)})`;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([8, 12]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Start/finish line
        {
          const sfP = lemniscatePos(0, scale);
          const sfAngle = lemniscateNormal(0);
          for (let j = -6; j <= 6; j++) {
            const off = (j / 6) * trackW * 0.35;
            const sx = cx + sfP.x + Math.cos(sfAngle) * off;
            const sy = cy + sfP.y + Math.sin(sfAngle) * off;
            ctx.fillStyle = j % 2 === 0 ? '#fff' : '#111';
            ctx.fillRect(sx - 1.5, sy - trackW * 0.15, 3, trackW * 0.3);
          }
        }

        // Cars
        const carW = trackW * 0.4;
        const carH = trackW * 0.22;
        for (const car of gs.cars) {
          if (!car.active && car.finishTime === null) continue;
          const t = car.progress * Math.PI * 2;
          const base = lemniscatePos(t, scale);
          const carX = cx + base.x;
          const carY = cy + base.y;
          const angle = lemniscateAngle(t);

          ctx.save();
          ctx.translate(carX, carY);
          ctx.rotate(angle + Math.PI / 2);

          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 6;
          ctx.fillStyle = car.color;
          ctx.beginPath();
          ctx.roundRect(-carW / 2, -carH / 2, carW, carH, 3);
          ctx.fill();
          ctx.shadowBlur = 0;

          const hlGrad = ctx.createLinearGradient(0, -carH / 2, 0, carH / 2);
          hlGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
          hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.02)');
          hlGrad.addColorStop(1, 'rgba(0,0,0,0.15)');
          ctx.fillStyle = hlGrad;
          ctx.beginPath();
          ctx.roundRect(-carW / 2, -carH / 2, carW, carH, 3);
          ctx.fill();

          ctx.strokeStyle = car.isPlayer ? '#f0f6fc' : 'rgba(255,255,255,0.15)';
          ctx.lineWidth = car.isPlayer ? 2 : 1;
          ctx.beginPath();
          ctx.roundRect(-carW / 2, -carH / 2, carW, carH, 3);
          ctx.stroke();

          if (car.isPlayer) {
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(0, -carH / 2 - 4, 3, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();

          ctx.fillStyle = car.isPlayer ? '#f0f6fc' : '#8b949e';
          ctx.font = 'bold 9px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(car.name, carX, carY + carH / 2 + 3);
        }

        // Particles
        for (const p of gs.particles) {
          const alpha = p.life / p.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Update UI state
        if (gs.cars[0]) {
          const p = gs.cars[0];
          const standings = [...gs.cars]
            .sort((a, b) => b.laps - a.laps || b.progress - a.progress)
            .map(c => ({ name: c.name, laps: c.laps, color: c.color, isPlayer: c.isPlayer, finished: !c.active }));
          setUiState(prev => ({
            ...prev, playerFuel: p.fuel, playerDamage: p.damage, playerLaps: p.laps, playerSpeed: p.speed,
            standings, winner: gs.winner, boostReady: gs.boostReady, combo: gs.combo,
            difficultyLevel: gs.difficultyLevel,
          }));
        }

        animRef.current = requestAnimationFrame(gameLoop);
      }, [mode, account, addCoins]);

      useEffect(() => {
        initRace();
        animRef.current = requestAnimationFrame(gameLoop);
        return () => cancelAnimationFrame(animRef.current);
      }, [mode]);

      const currentStandings = uiState.standings;

      function handleFinish() {
        const playerPos = currentStandings.findIndex(s => s.isPlayer) + 1;
        const won = playerPos === 1;
        addXp(won ? WIN_REWARD_XP : RACE_REWARD_XP);
        addCoins(won ? WIN_REWARD_COINS : RACE_REWARD_COINS);
        const username = getCurrentUsername();
        if (username) {
          updateAccount(username, (a) => {
            a.stats.racesDone += 1;
            if (won) a.stats.wins += 1;
            const playerCar = gsRef.current.cars[0];
            a.car.damage = playerCar ? Math.min(MAX_DAMAGE, playerCar.damage) : 0;
            return a;
          });
        }
        refreshAccount();
        onFinish();
      }

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#0d1117' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 16px', background: '#161b22', borderBottom: '1px solid #30363d', minHeight: 40 }}>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
              <span style={{ color: '#8b949e', fontSize: 13 }}>{mode === 'math' ? 'Math' : 'Typing'}</span>
              <span style={{ color: '#58a6ff', fontSize: 12, fontWeight: 600 }}>Lv.{uiState.difficultyLevel}</span>
              {uiState.combo > 1 && (
                <span style={{ color: '#f1c40f', fontSize: 12, fontWeight: 700 }}>x{uiState.combo} combo</span>
              )}
            </div>
            <span style={{ color: '#f0f6fc', fontWeight: 700, fontSize: 14 }}>Lap {Math.min(uiState.playerLaps + 1, LAPS_TO_WIN)} / {LAPS_TO_WIN}</span>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              {uiState.boostReady && (
                <span style={{ color: '#f1c40f', fontSize: 11, fontWeight: 700, background: 'rgba(241,196,15,0.15)', padding: '3px 8px', borderRadius: 4, border: '1px solid #f1c40f' }}>
                  BOOST
                </span>
              )}
              <button onClick={onFinish} style={{ padding: '4px 14px', borderRadius: 6, background: '#21262d', color: '#e6edf3', fontSize: 12, border: '1px solid #30363d' }}>Quit</button>
            </div>
          </div>

          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            <div style={{ flex: 1, position: 'relative' }}>
              <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }} />

              {uiState.phase === 'countdown' && uiState.countdown > 0 && (
                <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.7)' }}>
                  <span style={{ fontSize: 96, fontWeight: 900, color: uiState.countdown <= 1 ? '#f1c40f' : '#f0f6fc' }}>{uiState.countdown}</span>
                </div>
              )}

              {uiState.winner && (
                <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.8)' }}>
                  <h2 style={{ fontSize: 36, fontWeight: 900, color: uiState.winner === PLAYER_NAME ? '#f1c40f' : '#8b949e', marginBottom: 8 }}>
                    {uiState.winner === PLAYER_NAME ? 'You Win!' : `${uiState.winner} Wins!`}
                  </h2>
                  <p style={{ color: '#8b949e', marginBottom: 20, fontSize: 14 }}>
                    {currentStandings.findIndex(s => s.isPlayer) + 1}
                    {['st','nd','rd','th'][Math.min(currentStandings.findIndex(s => s.isPlayer), 3)]} place
                  </p>
                  <button onClick={handleFinish} style={{ padding: '12px 32px', borderRadius: 8, background: '#238636', color: '#fff', fontSize: 16, fontWeight: 700 }}>Finish</button>
                </div>
              )}
            </div>

            <div style={{ width: 180, background: '#161b22', borderLeft: '1px solid #30363d', padding: 10, display: 'flex', flexDirection: 'column', gap: 6 }}>
              <div style={{ background: '#0d1117', borderRadius: 8, padding: 10, border: '1px solid #30363d' }}>
                <p style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Car</p>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                  <span style={{ fontSize: 11, color: '#8b949e' }}>Fuel</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: uiState.playerFuel > 50 ? '#39d152' : uiState.playerFuel > 20 ? '#f1c40f' : '#f85149' }}>{Math.round(uiState.playerFuel)}%</span>
                </div>
                <div style={{ height: 3, background: '#21262d', borderRadius: 2, marginBottom: 6 }}>
                  <div style={{ width: `${uiState.playerFuel}%`, height: '100%', background: uiState.playerFuel > 50 ? '#39d152' : uiState.playerFuel > 20 ? '#f1c40f' : '#f85149', borderRadius: 2 }} />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                  <span style={{ fontSize: 11, color: '#8b949e' }}>Damage</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: uiState.playerDamage > 50 ? '#f85149' : uiState.playerDamage > 20 ? '#f1c40f' : '#8b949e' }}>{Math.round(uiState.playerDamage)}%</span>
                </div>
                <div style={{ height: 3, background: '#21262d', borderRadius: 2 }}>
                  <div style={{ width: `${uiState.playerDamage}%`, height: '100%', background: uiState.playerDamage > 50 ? '#f85149' : uiState.playerDamage > 20 ? '#f1c40f' : '#484f58', borderRadius: 2 }} />
                </div>
              </div>

              <div style={{ flex: 1, background: '#0d1117', borderRadius: 8, padding: 10, border: '1px solid #30363d', overflow: 'auto' }}>
                <p style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Standings</p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {currentStandings.map((s, i) => (
                    <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 5px', borderRadius: 3, background: s.isPlayer ? 'rgba(35,134,54,0.15)' : 'transparent' }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: '#484f58', width: 14 }}>{i + 1}</span>
                      <span style={{ width: 8, height: 8, borderRadius: '50%', background: s.color, border: '1px solid #30363d' }} />
                      <span style={{ fontSize: 11, fontWeight: s.isPlayer ? 700 : 400, color: '#e6edf3', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.name}</span>
                      <span style={{ fontSize: 10, color: '#8b949e' }}>L{s.laps}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Bottom input panel */}
          <div style={{ background: '#161b22', borderTop: '1px solid #30363d', padding: '10px 20px', minHeight: 80, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            {mode === 'math' ? (
              uiState.question ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ color: '#f0f6fc', fontSize: 24, fontWeight: 700 }}>{uiState.question.text}</span>
                  <form onSubmit={e => { e.preventDefault(); handleMathAnswer(answer); }} style={{ display: 'flex', gap: 8 }}>
                    <input ref={inputRef} value={answer} onChange={e => setAnswer(e.target.value)} style={{ width: 100, padding: '8px 12px', borderRadius: 6, border: '1px solid #30363d', background: '#0d1117', color: '#e6edf3', fontSize: 20, textAlign: 'center' }} placeholder="?" autoFocus />
                    <button type="submit" style={{ padding: '8px 20px', borderRadius: 6, background: '#238636', color: '#fff', fontSize: 15, fontWeight: 600 }}>Go</button>
                  </form>
                  {uiState.boostReady && <span style={{ color: '#f1c40f', fontSize: 12, fontWeight: 700 }}>BOOST ARMED</span>}
                </div>
              ) : (
                <span style={{ color: '#8b949e', fontSize: 15 }}>Waiting for next question...</span>
              )
            ) : (
              uiState.typingState ? (
                <div style={{ width: '100%', maxWidth: 600, textAlign: 'center' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3, justifyContent: 'center', marginBottom: 8 }}>
                    {uiState.typingState.words.map((word, i) => (
                      <span key={i} style={{ padding: '2px 5px', borderRadius: 3, fontSize: 15, fontWeight: 600, color: i < uiState.typingState.currentWordIdx ? '#238636' : i === uiState.typingState.currentWordIdx ? '#f0f6fc' : '#484f58', background: i === uiState.typingState.currentWordIdx ? 'rgba(35,134,54,0.15)' : 'transparent' }}>{word}</span>
                    ))}
                  </div>
                  <input ref={inputRef} value={typingInput} onChange={e => handleTypingInput(e.target.value)} onKeyDown={handleTypingKey} style={{ width: '100%', padding: '8px 12px', borderRadius: 6, border: '1px solid #30363d', background: '#0d1117', color: '#e6edf3', fontSize: 16 }} placeholder="Type here..." autoFocus />
                </div>
              ) : (
                <span style={{ color: '#8b949e', fontSize: 15 }}>Get ready to type...</span>
              )
            )}
          </div>
        </div>
      );
    }

    // ─── Remaining Pages ──────────────────────────────────────

    function GaragePage({ onBack }) {
      const { account, refreshAccount } = useAuth();
      const [msg, setMsg] = useState('');

      function changeColor(hex) {
        if (!account) return; const username = getCurrentUsername(); if (!username) return;
        updateAccount(username, (a) => { a.car.color = hex; return a; }); refreshAccount(); setMsg('Color changed!'); setTimeout(() => setMsg(''), 2000);
      }

      function useFix(tier) {
        if (!account) return; const fix = FIXES.find(f => f.tier === tier); if (!fix) return;
        const key = `fix${tier.charAt(0).toUpperCase() + tier.slice(1)}`;
        if (account.inventory[key] <= 0) { setMsg(`No ${fix.name} available!`); setTimeout(() => setMsg(''), 2000); return; }
        if (account.car.damage <= 0) { setMsg('Car already has no damage!'); setTimeout(() => setMsg(''), 2000); return; }
        const username = getCurrentUsername(); if (!username) return;
        updateAccount(username, (a) => { a.inventory[key] -= 1; a.car.damage = Math.max(0, a.car.damage - fix.repairAmount); return a; });
        refreshAccount(); setMsg(`Used ${fix.name}! Repaired ${fix.repairAmount} damage.`); setTimeout(() => setMsg(''), 2000);
      }

      if (!account) return null;
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', borderBottom: '1px solid #30363d' }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: '#f0f6fc' }}>Garage</h2>
            <button onClick={onBack} style={{ padding: '8px 20px', borderRadius: 6, background: '#21262d', color: '#e6edf3', fontSize: 14, border: '1px solid #30363d' }}>Back</button>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 20, maxWidth: 600, margin: '0 auto', width: '100%' }}>
            {msg && <p style={{ color: '#39d152', fontSize: 14, marginBottom: 16, textAlign: 'center' }}>{msg}</p>}
            <div style={{ background: '#161b22', borderRadius: 10, padding: 24, border: '1px solid #30363d', marginBottom: 20, textAlign: 'center' }}>
              <div style={{ width: 120, height: 60, background: account.car.color, borderRadius: 10, margin: '0 auto 16px', border: '2px solid #30363d', position: 'relative' }}>
                <div style={{ position: 'absolute', top: -8, left: '50%', transform: 'translateX(-50%)', width: 16, height: 8, background: '#f1c40f', borderRadius: '2px 2px 0 0' }} />
              </div>
              <p style={{ color: '#8b949e', fontSize: 13 }}>Damage: {Math.round(account.car.damage)}%</p>
              <div style={{ height: 6, background: '#21262d', borderRadius: 3, marginTop: 6 }}><div style={{ width: `${account.car.damage}%`, height: '100%', background: account.car.damage > 50 ? '#f85149' : account.car.damage > 20 ? '#f1c40f' : '#39d152', borderRadius: 3 }} /></div>
            </div>
            <div style={{ background: '#161b22', borderRadius: 10, padding: 16, border: '1px solid #30363d', marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: '#f0f6fc', marginBottom: 12 }}>Repairs</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {FIXES.map(fix => {
                  const key = `fix${fix.tier.charAt(0).toUpperCase() + fix.tier.slice(1)}`; const count = account.inventory[key];
                  return (
                    <div key={fix.tier} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: '#0d1117', borderRadius: 8, border: '1px solid #30363d' }}>
                      <div><p style={{ fontSize: 14, fontWeight: 600, color: '#e6edf3' }}>{fix.name}</p><p style={{ fontSize: 12, color: '#8b949e' }}>{fix.desc} (owned: {count})</p></div>
                      <button onClick={() => useFix(fix.tier)} disabled={count <= 0 || account.car.damage <= 0} style={{ padding: '8px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, background: count > 0 && account.car.damage > 0 ? '#238636' : '#21262d', color: count > 0 && account.car.damage > 0 ? '#fff' : '#484f58', border: '1px solid #30363d' }}>Use</button>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{ background: '#161b22', borderRadius: 10, padding: 16, border: '1px solid #30363d' }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: '#f0f6fc', marginBottom: 12 }}>Colors</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
                {CAR_COLORS.map(c => {
                  const unlocked = account.unlockedColors.includes(c.hex); const isCurrent = account.car.color === c.hex;
                  return (
                    <button key={c.hex} onClick={() => unlocked && changeColor(c.hex)} disabled={!unlocked || isCurrent} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8, background: isCurrent ? 'rgba(35,134,54,0.2)' : '#0d1117', border: isCurrent ? '1px solid #238636' : '1px solid #30363d', cursor: unlocked && !isCurrent ? 'pointer' : 'default', opacity: unlocked ? 1 : 0.5 }}>
                      <span style={{ width: 24, height: 24, borderRadius: '50%', background: c.hex, border: '2px solid #30363d' }} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: isCurrent ? '#39d152' : '#e6edf3' }}>{c.name}{!unlocked && ` (${c.cost}c)`}{isCurrent && ' (current)'}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ShopPage({ onBack }) {
      const { account, refreshAccount } = useAuth();
      const [msg, setMsg] = useState('');

      function buyBoost(tier) {
        if (!account) return; const boost = BOOSTS.find(b => b.tier === tier); if (!boost) return;
        if (account.coins < boost.cost) { setMsg('Not enough coins!'); setTimeout(() => setMsg(''), 2000); return; }
        const key = `boost${tier.charAt(0).toUpperCase() + tier.slice(1)}`; const username = getCurrentUsername(); if (!username) return;
        updateAccount(username, (a) => { a.coins -= boost.cost; a.inventory[key] += 1; return a; }); refreshAccount(); setMsg(`Bought ${boost.name}!`); setTimeout(() => setMsg(''), 2000);
      }

      function buyFix(tier) {
        if (!account) return; const fix = FIXES.find(f => f.tier === tier); if (!fix) return;
        if (account.coins < fix.cost) { setMsg('Not enough coins!'); setTimeout(() => setMsg(''), 2000); return; }
        const key = `fix${tier.charAt(0).toUpperCase() + tier.slice(1)}`; const username = getCurrentUsername(); if (!username) return;
        updateAccount(username, (a) => { a.coins -= fix.cost; a.inventory[key] += 1; return a; }); refreshAccount(); setMsg(`Bought ${fix.name}!`); setTimeout(() => setMsg(''), 2000);
      }

      function buyColor(hex, cost) {
        if (!account) return; if (account.unlockedColors.includes(hex)) { setMsg('Already owned!'); setTimeout(() => setMsg(''), 2000); return; }
        if (account.coins < cost) { setMsg('Not enough coins!'); setTimeout(() => setMsg(''), 2000); return; }
        const username = getCurrentUsername(); if (!username) return;
        updateAccount(username, (a) => { a.coins -= cost; a.unlockedColors.push(hex); return a; }); refreshAccount(); setMsg('Color unlocked!'); setTimeout(() => setMsg(''), 2000);
      }

      if (!account) return null;
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', borderBottom: '1px solid #30363d' }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: '#f0f6fc' }}>Shop</h2>
            <span style={{ color: '#f1c40f', fontWeight: 700, fontSize: 15 }}>{account.coins} coins</span>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 20, maxWidth: 600, margin: '0 auto', width: '100%' }}>
            <button onClick={onBack} style={{ padding: '8px 20px', borderRadius: 6, background: '#21262d', color: '#e6edf3', fontSize: 14, border: '1px solid #30363d', marginBottom: 16 }}>Back</button>
            {msg && <p style={{ color: '#39d152', fontSize: 14, marginBottom: 16, textAlign: 'center' }}>{msg}</p>}
            <div style={{ background: '#161b22', borderRadius: 10, padding: 16, border: '1px solid #30363d', marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: '#f0f6fc', marginBottom: 8 }}>Boosts</h3>
              <p style={{ color: '#8b949e', fontSize: 13, marginBottom: 12 }}>Math: E to arm, then answer correctly. Typing: Tab to arm.</p>
              {BOOSTS.map(boost => (
                <div key={boost.tier} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: '#0d1117', borderRadius: 8, border: '1px solid #30363d', marginBottom: 8 }}>
                  <div><p style={{ fontSize: 14, fontWeight: 600, color: '#e6edf3' }}>{boost.name}</p><p style={{ fontSize: 12, color: '#8b949e' }}>{boost.desc}</p></div>
                  <button onClick={() => buyBoost(boost.tier)} disabled={account.coins < boost.cost} style={{ padding: '8px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, background: account.coins >= boost.cost ? '#238636' : '#21262d', color: account.coins >= boost.cost ? '#fff' : '#484f58', border: '1px solid #30363d' }}>{boost.cost}c</button>
                </div>
              ))}
            </div>
            <div style={{ background: '#161b22', borderRadius: 10, padding: 16, border: '1px solid #30363d', marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: '#f0f6fc', marginBottom: 8 }}>Repair Kits</h3>
              <p style={{ color: '#8b949e', fontSize: 13, marginBottom: 12 }}>Fix car damage from wrong answers.</p>
              {FIXES.map(fix => (
                <div key={fix.tier} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: '#0d1117', borderRadius: 8, border: '1px solid #30363d', marginBottom: 8 }}>
                  <div><p style={{ fontSize: 14, fontWeight: 600, color: '#e6edf3' }}>{fix.name}</p><p style={{ fontSize: 12, color: '#8b949e' }}>{fix.desc}</p></div>
                  <button onClick={() => buyFix(fix.tier)} disabled={account.coins < fix.cost} style={{ padding: '8px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, background: account.coins >= fix.cost ? '#238636' : '#21262d', color: account.coins >= fix.cost ? '#fff' : '#484f58', border: '1px solid #30363d' }}>{fix.cost}c</button>
                </div>
              ))}
            </div>
            <div style={{ background: '#161b22', borderRadius: 10, padding: 16, border: '1px solid #30363d' }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: '#f0f6fc', marginBottom: 8 }}>Car Colors</h3>
              <p style={{ color: '#8b949e', fontSize: 13, marginBottom: 12 }}>Customize your racer.</p>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
                {CAR_COLORS.filter(c => c.cost > 0).map(c => {
                  const owned = account.unlockedColors.includes(c.hex);
                  return (
                    <button key={c.hex} onClick={() => buyColor(c.hex, c.cost)} disabled={owned || account.coins < c.cost} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8, background: '#0d1117', border: owned ? '1px solid #238636' : '1px solid #30363d', opacity: owned ? 0.6 : account.coins >= c.cost ? 1 : 0.4 }}>
                      <span style={{ width: 24, height: 24, borderRadius: '50%', background: c.hex, border: '2px solid #30363d' }} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: owned ? '#39d152' : '#e6edf3' }}>{owned ? 'Owned' : `${c.name} (${c.cost}c)`}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AchievementsPage({ onBack }) {
      const { account } = useAuth();
      if (!account) return null;
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', borderBottom: '1px solid #30363d' }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: '#f0f6fc' }}>Achievements</h2>
            <span style={{ color: '#58a6ff', fontWeight: 700, fontSize: 15 }}>{account.xp} XP</span>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 20, maxWidth: 600, margin: '0 auto', width: '100%' }}>
            <button onClick={onBack} style={{ padding: '8px 20px', borderRadius: 6, background: '#21262d', color: '#e6edf3', fontSize: 14, border: '1px solid #30363d', marginBottom: 16 }}>Back</button>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {ACHIEVEMENTS.map(ach => {
                const unlocked = account.achievements.includes(ach.id);
                return (
                  <div key={ach.id} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', borderRadius: 10, background: unlocked ? 'rgba(35,134,54,0.1)' : '#161b22', border: unlocked ? '1px solid #238636' : '1px solid #30363d', opacity: unlocked ? 1 : 0.6 }}>
                    <div style={{ width: 40, height: 40, borderRadius: '50%', background: unlocked ? '#238636' : '#21262d', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, fontWeight: 900, color: unlocked ? '#fff' : '#484f58', flexShrink: 0 }}>{unlocked ? ach.reward : '?'}</div>
                    <div style={{ flex: 1 }}><p style={{ fontSize: 15, fontWeight: 700, color: unlocked ? '#39d152' : '#e6edf3' }}>{ach.name}</p><p style={{ fontSize: 13, color: '#8b949e' }}>{ach.desc}</p></div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: unlocked ? '#f1c40f' : '#484f58' }}>{unlocked ? `+${ach.reward}c` : `${ach.reward}c`}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────
    function App() {
      const { account } = useAuth();
      const [screen, setScreen] = useState('menu');
      const [raceMode, setRaceMode] = useState('math');

      if (!account) return <LoginPage />;
      switch (screen) {
        case 'menu': return <MenuPage onNavigate={setScreen} />;
        case 'lobby': return <LobbyPage mode={raceMode} setMode={setRaceMode} onStart={() => setScreen('race')} onBack={() => setScreen('menu')} />;
        case 'race': return <RacePage mode={raceMode} onFinish={() => setScreen('menu')} />;
        case 'garage': return <GaragePage onBack={() => setScreen('menu')} />;
        case 'shop': return <ShopPage onBack={() => setScreen('menu')} />;
        case 'achievements': return <AchievementsPage onBack={() => setScreen('menu')} />;
      }
    }

    createRoot(document.getElementById('root')).render(
      <AuthProvider><App /></AuthProvider>
    );
  </script>
</body>
</html>
